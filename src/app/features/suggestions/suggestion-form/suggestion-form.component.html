<div class="form-container">
  <form [formGroup]="suggestionForm" (ngSubmit)="onSubmit()">

    <div class="form-group">
      <label>Titre :</label>
      <input type="text" formControlName="title" />
      <div class="error" *ngIf="suggestionForm.get('title')?.invalid && suggestionForm.get('title')?.touched">
        <span *ngIf="suggestionForm.get('title')?.errors?.['required']">Le titre est obligatoire.</span>
        <span *ngIf="suggestionForm.get('title')?.errors?.['minlength']">Le titre doit contenir au minimum 5 caractères.</span>
        <span *ngIf="suggestionForm.get('title')?.errors?.['pattern']">Le titre doit commencer par une majuscule et ne contenir que des lettres.</span>
      </div>
    </div>

    <div class="form-group">
      <label>Description :</label>
      <textarea formControlName="description" rows="4"></textarea>
      <div class="error" *ngIf="suggestionForm.get('description')?.invalid && suggestionForm.get('description')?.touched">
        <span *ngIf="suggestionForm.get('description')?.errors?.['required']">La description est obligatoire.</span>
        <span *ngIf="suggestionForm.get('description')?.errors?.['minlength']">La description doit contenir au minimum 30 caractères.</span>
      </div>
    </div>

    <div class="form-group">
      <label>Catégorie :</label>
      <select formControlName="category">
        <option value="">-- Sélectionnez une catégorie --</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
      <div class="error" *ngIf="suggestionForm.get('category')?.invalid && suggestionForm.get('category')?.touched">
        <span *ngIf="suggestionForm.get('category')?.errors?.['required']">La catégorie est obligatoire.</span>
      </div>
    </div>

    <div class="form-group">
      <label>Date :</label>
      <input type="text" formControlName="date" readonly />
    </div>

    
<div class="form-group">
  <label>Status :</label>
  <input type="text" value="en attente" readonly style="width: 100%; padding: 8px; background: #f5f5f5;" />
</div>
    <button type="submit" [disabled]="suggestionForm.invalid" class="btn-submit">
      Soumettre
    </button>

  </form>
</div>
